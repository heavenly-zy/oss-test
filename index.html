<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阿里云 OSS 浏览器端直传示例</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 600px;
        margin: 40px auto;
        padding: 0 20px;
      }
    </style>
  </head>
  <body>
    <h1>阿里云 OSS 浏览器端直传示例</h1>

    <!-- 文件选择输入 -->
    <input id="fileInput" type="file" />

    <!-- 上传状态提示 -->
    <p id="status"></p>

    <!-- 图片预览区域 -->
    <div id="preview"></div>

    <script>
      const fileInput = document.getElementById('fileInput');
      const status = document.getElementById('status');
      const preview = document.getElementById('preview');

      /**
       * 向应用服务器请求 OSS 临时上传凭证。
       * 实际项目中应改为请求后端接口，而不是在前端直接写死凭证。
       * @returns {Promise<{OSSAccessKeyId: string, Signature: string, policy: string, host: string}>}
       */
      async function fetchOSSInfo() {
        return {
          OSSAccessKeyId: 'LTAI5t7zgYkmU5PwtMAA6mTV',
          Signature: 'Y83scU4ZRcKDhlAGN+W/mw7FecM=',
          policy:
            'eyJleHBpcmF0aW9uIjoiMjAyNi0wNi0xNFQxMjowNDo1Ni4yNTdaIiwiY29uZGl0aW9ucyI6W1siY29udGVudC1sZW5ndGgtcmFuZ2UiLDAsMTA0ODU3NjAwMF1dfQ==',
          host: 'http://gugugaga-bucket.oss-cn-beijing.aliyuncs.com',
        };
      }

      /**
       * 更新页面上的上传状态文本。
       * @param {string} message 状态文案
       */
      function updateStatus(message) {
        status.textContent = message;
      }

      /**
       * 渲染上传结果。
       * 图片文件显示预览，其他文件显示访问链接。
       * @param {File} file 已上传文件
       * @param {string} url 文件访问地址
       */
      function renderUploadResult(file, url) {
        preview.replaceChildren();

        if (file.type.startsWith('image/')) {
          const img = document.createElement('img');
          img.src = url;
          img.alt = file.name;
          img.style.maxWidth = '300px';
          img.style.marginTop = '16px';
          preview.appendChild(img);
          return;
        }

        const link = document.createElement('a');
        link.href = url;
        link.target = '_blank';
        link.rel = 'noreferrer';
        link.textContent = `上传成功，点击查看：${file.name}`;
        preview.appendChild(link);
      }

      /**
       * 构建 OSS 表单直传所需的 FormData。
       * @param {File} file 待上传文件
       * @param {{OSSAccessKeyId: string, Signature: string, policy: string}} ossInfo 上传凭证
       * @returns {FormData}
       */
      function createUploadFormData(file, ossInfo) {
        const formData = new FormData();
        formData.append('key', file.name);
        formData.append('OSSAccessKeyId', ossInfo.OSSAccessKeyId);
        formData.append('policy', ossInfo.policy);
        formData.append('signature', ossInfo.Signature);
        formData.append('success_action_status', '200');
        formData.append('file', file);
        return formData;
      }

      /**
       * 处理文件选择并执行 OSS 直传。
       */
      fileInput.addEventListener('change', async () => {
        const [file] = fileInput.files;
        if (!file) {
          updateStatus('未选择文件');
          return;
        }

        fileInput.disabled = true;

        try {
          const ossInfo = await fetchOSSInfo();
          const formData = createUploadFormData(file, ossInfo);

          updateStatus('正在上传...');

          const response = await fetch(ossInfo.host, {
            method: 'POST',
            body: formData,
          });

          if (!response.ok) {
            throw new Error(`上传失败：${response.status}`);
          }

          const fileUrl = new URL(file.name, `${ossInfo.host}/`).toString();
          updateStatus('上传成功');
          renderUploadResult(file, fileUrl);
        } catch (error) {
          console.error('上传错误:', error);
          updateStatus(`上传失败：${error instanceof Error ? error.message : '未知错误'}`);
        } finally {
          fileInput.disabled = false;
        }
      });
    </script>
  </body>
</html>
