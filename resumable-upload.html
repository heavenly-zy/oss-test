<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阿里云 OSS 断点续传示例</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 900px;
        margin: 40px auto;
        padding: 0 20px;
      }
      .info {
        background: #fff3cd;
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 14px;
      }
      .progress-container {
        margin: 16px 0;
      }
      .progress-bar {
        width: 100%;
        height: 24px;
        background: #e0e0e0;
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #2196f3;
        transition: width 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 12px;
      }
      .progress-text {
        margin-top: 8px;
        font-size: 13px;
        color: #666;
      }
      #log {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 16px;
        border-radius: 6px;
        font-family: 'Monaco', 'Menlo', monospace;
        font-size: 12px;
        max-height: 300px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
      .btn-group {
        display: flex;
        gap: 10px;
        margin-top: 16px;
        flex-wrap: wrap;
      }
      .btn-group.debug {
        background: #f5f5f5;
        padding: 12px;
        border-radius: 6px;
        margin-bottom: 20px;
      }
      button {
        padding: 10px 20px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
      }
      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      #uploadBtn { background: #2196f3; color: white; }
      #resetBtn { background: #f44336; color: white; }
      #debugBtn { background: #ff9800; color: white; }
      #simulateBtn { background: #9c27b0; color: white; }
      #clearLogBtn { background: #607d8b; color: white; }
      #clearStorageBtn { background: #795548; color: white; }
    </style>
  </head>
  <body>
    <h1>阿里云 OSS 断点续传示例</h1>

    <div class="info">
      <strong>说明：</strong>ali-oss 会自动保存 checkpoint 到浏览器 localStorage，
      网络中断或刷新页面后可自动从断点继续上传。
    </div>

    <input id="fileInput" type="file" />
    <div id="resumeInfo" style="color: #666; margin: 10px 0; display: none;"></div>

    <div class="btn-group">
      <button id="uploadBtn" disabled>开始上传</button>
      <button id="resetBtn" disabled>重置</button>
    </div>

    <!-- 调试工具 -->
    <h3>调试工具</h3>
    <div class="btn-group debug">
      <button id="debugBtn">查看 Checkpoint</button>
      <button id="clearStorageBtn">清空所有 Checkpoint</button>
      <button id="simulateBtn">模拟网络中断</button>
      <button id="clearLogBtn">清空日志</button>
    </div>

    <div class="progress-container" id="progressContainer" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
      </div>
      <div class="progress-text" id="progressText">准备上传...</div>
    </div>

    <h3>上传日志</h3>
    <div id="log"></div>

    <script type="module">
      import OSS from 'ali-oss';

      const fileInput = document.getElementById('fileInput');
      const uploadBtn = document.getElementById('uploadBtn');
      const resetBtn = document.getElementById('resetBtn');
      const debugBtn = document.getElementById('debugBtn');
      const clearStorageBtn = document.getElementById('clearStorageBtn');
      const simulateBtn = document.getElementById('simulateBtn');
      const clearLogBtn = document.getElementById('clearLogBtn');
      const progressContainer = document.getElementById('progressContainer');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');
      const logEl = document.getElementById('log');
      const resumeInfo = document.getElementById('resumeInfo');

      let client = null;
      let currentFile = null;
      let isUploading = false;
      let checkpointData = null;

      async function fetchOSSInfo() {
        const response = await fetch('/api/oss-token');
        const result = await response.json();
        if (!result.success) {
          throw new Error(result.error || '获取凭证失败');
        }
        return result.data;
      }

      async function getOSSClient() {
        if (!client) {
          const ossInfo = await fetchOSSInfo();
          client = new OSS({
            region: 'oss-cn-beijing',
            accessKeyId: ossInfo.accessKeyId,
            accessKeySecret: ossInfo.accessKeySecret,
            stsToken: ossInfo.stsToken,
            bucket: 'gugugaga-bucket',
          });
        }
        return client;
      }

      function getCheckpointKey(file) {
        return `oss_checkpoint_${file.name}_${file.size}`;
      }

      function loadCheckpoint(file) {
        if (!file) return null;
        const data = localStorage.getItem(getCheckpointKey(file));
        return data ? JSON.parse(data) : null;
      }

      function removeCheckpoint(file) {
        if (!file) return;
        localStorage.removeItem(getCheckpointKey(file));
      }

      function clearAllCheckpoints() {
        const keys = Object.keys(localStorage).filter(k => k.startsWith('oss_checkpoint_'));
        keys.forEach(k => localStorage.removeItem(k));
        return keys.length;
      }

      function formatSize(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
      }

      function addLog(message) {
        const time = new Date().toLocaleTimeString();
        logEl.textContent += `[${time}] ${message}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function updateProgress(percent, text) {
        progressFill.style.width = `${percent}%`;
        progressFill.textContent = `${percent}%`;
        progressText.textContent = text;
      }

      // ============ 调试按钮功能 ============

      // 查看 checkpoint
      debugBtn.addEventListener('click', () => {
        if (currentFile) {
          const checkpoint = loadCheckpoint(currentFile);
          addLog('=== Checkpoint 信息 ===');
          if (checkpoint) {
            addLog(`文件: ${currentFile.name}`);
            addLog(`文件大小: ${formatSize(currentFile.size)}`);
            addLog(`上传 ID: ${checkpoint.uploadId || 'N/A'}`);
            addLog(`文件名: ${checkpoint.name || 'N/A'}`);
            addLog(`进度: ${checkpoint.ratio ? (checkpoint.ratio * 100).toFixed(1) + '%' : 'N/A'}`);
            addLog(`已完成分片: ${checkpoint.doneParts?.length || 0}`);
            addLog(`已上传: ${checkpoint.loaded ? formatSize(checkpoint.loaded) : 'N/A'}`);
          } else {
            addLog('当前文件没有 checkpoint');
          }
        } else {
          // 查看所有 checkpoint
          const keys = Object.keys(localStorage).filter(k => k.startsWith('oss_checkpoint_'));
          addLog('=== 所有 Checkpoint ===');
          addLog(`共 ${keys.length} 个`);
          keys.forEach(k => {
            const data = JSON.parse(localStorage.getItem(k));
            addLog(`${k}: ${data?.name || 'unknown'} (${data?.ratio ? (data.ratio * 100).toFixed(1) + '%' : 'N/A'})`);
          });
        }
      });

      // 清空所有 checkpoint
      clearStorageBtn.addEventListener('click', () => {
        const count = clearAllCheckpoints();
        addLog(`已清空 ${count} 个 checkpoint`);
        if (currentFile) {
          resumeInfo.style.display = 'none';
        }
      });

      // 模拟网络中断
      simulateBtn.addEventListener('click', async () => {
        if (!isUploading) {
          addLog('先开始上传，再点击"模拟中断"');
          return;
        }
        addLog('⚠️ 模拟网络中断...');
        isUploading = false;
        // 强制停止上传
      });

      // 清空日志
      clearLogBtn.addEventListener('click', () => {
        logEl.textContent = '';
        addLog('日志已清空');
      });

      // ============ 主要功能 ============

      fileInput.addEventListener('change', () => {
        currentFile = fileInput.files?.[0] || null;
        uploadBtn.disabled = !currentFile;
        resetBtn.disabled = !currentFile;

        if (currentFile) {
          const checkpoint = loadCheckpoint(currentFile);
          if (checkpoint) {
            const progress = checkpoint.ratio ? (checkpoint.ratio * 100).toFixed(1) : '0';
            resumeInfo.style.display = 'block';
            resumeInfo.textContent = `检测到未完成上传 (${progress}%)，将从断点继续`;
          } else {
            resumeInfo.style.display = 'none';
          }
        }
      });

      uploadBtn.addEventListener('click', async () => {
        if (!currentFile) return;

        isUploading = true;
        uploadBtn.disabled = true;
        fileInput.disabled = true;
        progressContainer.style.display = 'block';
        logEl.textContent = '';

        try {
          const ossClient = await getOSSClient();
          const objectKey = `uploads/${Date.now()}_${currentFile.name}`;
          checkpointData = loadCheckpoint(currentFile);

          if (checkpointData) {
            addLog(`从断点继续上传: ${currentFile.name} (${formatSize(currentFile.size)})`);
          } else {
            addLog(`开始断点续传上传: ${currentFile.name} (${formatSize(currentFile.size)})`);
          }

          const result = await ossClient.multipartUpload(objectKey, currentFile, {
            partSize: 1024 * 1024,
            progress: (p, cpt) => {
              if (!isUploading) return;

              const percent = Math.round(p * 100);
              updateProgress(percent, `已上传 ${formatSize(currentFile.size * p)} / ${formatSize(currentFile.size)}`);

              if (cpt) {
                checkpointData = cpt;
                localStorage.setItem(getCheckpointKey(currentFile), JSON.stringify(cpt));
              }
            },
            checkpoint: checkpointData,
          });

          addLog(`上传成功!`);
          addLog(`ETag: ${result.etag}`);
          addLog(`URL: https://gugugaga-bucket.oss-cn-beijing.aliyuncs.com/${objectKey}`);

          removeCheckpoint(currentFile);
          checkpointData = null;

          updateProgress(100, '上传完成!');

        } catch (err) {
          if (isUploading) {
            addLog(`上传失败: ${err.message}`);
            addLog('刷新页面后可从断点继续...');
          }
          console.error(err);
        } finally {
          isUploading = false;
          uploadBtn.disabled = false;
          fileInput.disabled = false;
        }
      });

      resetBtn.addEventListener('click', () => {
        if (currentFile) {
          removeCheckpoint(currentFile);
          addLog(`已删除 ${currentFile.name} 的 checkpoint`);
        }
        fileInput.value = '';
        currentFile = null;
        checkpointData = null;
        isUploading = false;
        uploadBtn.disabled = true;
        resetBtn.disabled = true;
        resumeInfo.style.display = 'none';
        progressContainer.style.display = 'none';
      });
    </script>
  </body>
</html>
