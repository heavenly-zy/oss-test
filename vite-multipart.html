<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>阿里云 OSS 分片上传示例</title>
    <style>
      body {
        font-family: system-ui, -apple-system, sans-serif;
        max-width: 800px;
        margin: 40px auto;
        padding: 0 20px;
      }
      .info {
        background: #f5f5f5;
        padding: 12px 16px;
        border-radius: 6px;
        margin-bottom: 20px;
        font-size: 14px;
      }
      .progress-container {
        margin: 16px 0;
      }
      .progress-bar {
        width: 100%;
        height: 24px;
        background: #e0e0e0;
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #4caf50;
        transition: width 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-size: 12px;
      }
      .progress-text {
        margin-top: 8px;
        font-size: 13px;
        color: #666;
      }
      #log {
        background: #1e1e1e;
        color: #d4d4d4;
        padding: 16px;
        border-radius: 6px;
        font-family: 'Monaco', 'Menlo', monospace;
        font-size: 12px;
        max-height: 300px;
        overflow-y: auto;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <h1>阿里云 OSS 分片上传示例</h1>

    <div class="info">
      <strong>说明：</strong>分片上传将大文件分割为多个小分片并发传输，适合上传大文件（>100MB）。
      单个分片失败时仅需重传该分片，无需重新上传整个文件。
    </div>

    <input id="fileInput" type="file" />
    <button id="uploadBtn" disabled>开始上传</button>

    <div class="progress-container" id="progressContainer" style="display: none;">
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%">0%</div>
      </div>
      <div class="progress-text" id="progressText">准备上传...</div>
    </div>

    <h3>上传日志</h3>
    <div id="log"></div>

    <script type="module">
      import { multipartUpload, formatSize } from './src/upload.js';

      const fileInput = document.getElementById('fileInput');
      const uploadBtn = document.getElementById('uploadBtn');
      const progressContainer = document.getElementById('progressContainer');
      const progressFill = document.getElementById('progressFill');
      const progressText = document.getElementById('progressText');
      const logEl = document.getElementById('log');

      function addLog(message) {
        const time = new Date().toLocaleTimeString();
        logEl.textContent += `[${time}] ${message}\n`;
        logEl.scrollTop = logEl.scrollHeight;
      }

      function updateProgress(percent, text) {
        progressFill.style.width = `${percent}%`;
        progressFill.textContent = `${percent}%`;
        progressText.textContent = text;
      }

      fileInput.addEventListener('change', () => {
        uploadBtn.disabled = !fileInput.files?.length;
      });

      uploadBtn.addEventListener('click', async () => {
        const [file] = fileInput.files;
        if (!file) return;

        uploadBtn.disabled = true;
        fileInput.disabled = true;
        progressContainer.style.display = 'block';
        logEl.textContent = '';

        try {
          addLog(`开始分片上传: ${file.name} (${formatSize(file.size)})`);

          const result = await multipartUpload(file, (percent) => {
            updateProgress(percent, `已上传 ${formatSize(file.size * percent / 100)} / ${formatSize(file.size)}`);
          });

          addLog(`上传成功!`);
          addLog(`ETag: ${result.etag}`);
          addLog(`URL: ${result.url}`);

          updateProgress(100, '上传完成!');
        } catch (err) {
          addLog(`上传失败: ${err.message}`);
          console.error(err);
        } finally {
          uploadBtn.disabled = false;
          fileInput.disabled = false;
        }
      });
    </script>
  </body>
</html>
